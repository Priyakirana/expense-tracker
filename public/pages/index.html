<!DOCTYPE html>
<html>
<head>
  <title>Expense Pro</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2>💸 Expense Pro</h2>
  <ul>
    <li>Home</li>
    <li>Features</li>
    <li onclick="window.location='login.html'">Login</li>
    <button class="btn" onclick="window.location='signup.html'">Get Started</button>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>Manage Your Expenses Smartly</h1>
    <p>Track spending, control budget and split expenses easily.</p>

    <button class="primary" onclick="window.location='signup.html'">Start Now</button>
    <button class="secondary">Learn More</button>
  </div>

  <div class="hero-card">
    <h3>Monthly Overview</h3>
    <p>Food: ₹2000</p>
    <p>Travel: ₹1500</p>
    <p>Bills: ₹3000</p>
  </div>
</section>

<!-- DASHBOARD -->
<section class="dashboard">
  <div class="card">
    <h3>Balance</h3>
    <p id="balance">₹0</p>
  </div>

  <div class="card">
    <h3>Total Spend</h3>
    <p id="total">₹0</p>
  </div>
</section>

<!-- TIMELINE -->
<section class="timeline-section">
  <h2>Recent Activity</h2>
  <div id="timeline"></div>
</section>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Add Expense</h3>

    <input id="amount" placeholder="₹ Amount">

    <select id="category">
      <option>🍔 Food</option>
      <option>🚗 Travel</option>
      <option>💡 Bills</option>
    </select>

    <input id="note" placeholder="Note">

    <button onclick="addExpense()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
