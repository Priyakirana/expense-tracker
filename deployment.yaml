apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-tracker
  template:
    metadata:
      labels:
        app: expense-tracker
    spec:
      containers:
        - name: expense-cont
          image: priyakirana14/expense:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: expense-service
spec:
  type: NodePort
  selector:
    app: expense-tracker
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007